{% load i18n %}
<h3 style="margin: 0 0 5px 0; padding: 0 0 3px 0; font-size: 11px; color: #00adb5; border-bottom: 1px solid #333; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">
    {% blocktrans with filter_title=title %} By {{ filter_title }} {% endblocktrans %}
</h3>

<!-- Quick Range Dropdown -->
<select id="date-range-select" onchange="handleDateDropdownChange(this.value);" style="width: 100%; padding: 4px 6px; border-radius: 4px; border: 1px solid #444; background-color: #2c2c2c; color: #e0e0e0; font-size: 12px; cursor: pointer; box-sizing: border-box; margin-bottom: 8px;">
    {% for choice in choices %}
        <option value="{{ choice.query_string|safe }}" {% if choice.selected %}selected{% endif %}>
            {{ choice.display }}
        </option>
    {% endfor %}
    <option value="custom" id="custom-option">Custom Range</option>
</select>

<!-- Custom Date Inputs -->
<div id="custom-date-inputs" style="display: none; flex-direction: column; gap: 5px; margin-top: 5px;">
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 5px;">
        <span style="font-size: 11px; color: #aaa; width: 35px;">From:</span>
        <input type="date" id="date-from" style="flex: 1; padding: 2px 4px; font-size: 11px; background-color: #2c2c2c; color: #fff; border: 1px solid #444; border-radius: 3px; color-scheme: dark;" />
    </div>
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 5px;">
        <span style="font-size: 11px; color: #aaa; width: 35px;">To:</span>
        <input type="date" id="date-to" style="flex: 1; padding: 2px 4px; font-size: 11px; background-color: #2c2c2c; color: #fff; border: 1px solid #444; border-radius: 3px; color-scheme: dark;" />
    </div>
    <button type="button" onclick="applyCustomDateRange();" style="width: 100%; padding: 4px; font-size: 11px; font-weight: bold; background-color: #00adb5; color: #fff; border: none; border-radius: 3px; cursor: pointer; margin-top: 3px;">
        Apply Range
    </button>
</div>

<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const fromVal = urlParams.get('created_at_from');
        const toVal = urlParams.get('created_at_to');
        
        const select = document.getElementById('date-range-select');
        const customDiv = document.getElementById('custom-date-inputs');
        const fromInput = document.getElementById('date-from');
        const toInput = document.getElementById('date-to');
        
        if (fromVal || toVal) {
            // Select custom option and show input fields
            document.getElementById('custom-option').selected = true;
            customDiv.style.display = 'flex';
            if (fromVal) fromInput.value = fromVal;
            if (toVal) toInput.value = toVal;
        }

        window.handleDateDropdownChange = function(val) {
            if (val === 'custom') {
                customDiv.style.display = 'flex';
            } else {
                customDiv.style.display = 'none';
                window.location = val;
            }
        };

        window.applyCustomDateRange = function() {
            const fromDate = fromInput.value;
            const toDate = toInput.value;
            
            const params = new URLSearchParams(window.location.search);
            // Clean up old values
            params.delete('created_at_filter');
            params.delete('created_at_from');
            params.delete('created_at_to');
            
            // Add new values
            if (fromDate) params.set('created_at_from', fromDate);
            if (toDate) params.set('created_at_to', toDate);
            
            window.location.search = params.toString();
        };
    })();
</script>
